name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pka-core:
    name: Ruff and PKA doctor
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install ruff
        run: python -m pip install ruff

      - name: Lint PKA scripts
        run: ruff check scripts governance

      - name: Run PKA doctor
        run: python scripts/pka_doctor.py
