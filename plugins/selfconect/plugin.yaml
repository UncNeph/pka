name: selfconect
version: 0.10.0
description: Inter-terminal injection for Windows - find terminals by title, inject text, read terminal content via UIA accessibility tree, submit Claude Code prompts programmatically.
category: communication
platform: windows
requires:
  - type: python
    value: ">=3.10"
  - type: python_package
    value: pywin32>=306
provides:
  capabilities:
    - inter-terminal-injection
    - terminal-text-read
    - claude-input-submit
  agents: []
  hooks: []
  scripts:
    - plugins/selfconect/self_connect.py
entry:
docs: plugins/selfconect/README.md
